server {
    listen 80;
    server_name dr-x.xtd.com.br www.dr-x.xtd.com.br api.dr-x.xtd.com.br studio.dr-x.xtd.com.br 185.202.223.115;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dr-x.xtd.com.br www.dr-x.xtd.com.br 185.202.223.115;

    ssl_certificate /etc/letsencrypt/live/dr-x.xtd.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dr-x.xtd.com.br/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.dr-x.xtd.com.br;

    ssl_certificate /etc/letsencrypt/live/dr-x.xtd.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dr-x.xtd.com.br/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
