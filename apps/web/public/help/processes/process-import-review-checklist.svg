<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none">
  <rect width="1200" height="700" rx="28" fill="#0F172A"/>
  <text x="72" y="88" fill="#F8FAFC" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Checklist de revisao antes de salvar</text>
  <text x="72" y="124" fill="#94A3B8" font-size="18" font-family="Segoe UI, Arial, sans-serif">Use esta sequencia para validar o que o PDF trouxe para o cadastro</text>

  <rect x="72" y="176" width="1056" height="452" rx="28" fill="#111827" stroke="#334155"/>

  <rect x="120" y="228" width="38" height="38" rx="12" fill="#0F172A" stroke="#10B981" stroke-width="3"/>
  <path d="M130 246L144 259L170 233" stroke="#10B981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="188" y="255" fill="#E2E8F0" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Aba TJ</text>
  <text x="188" y="288" fill="#94A3B8" font-size="17" font-family="Segoe UI, Arial, sans-serif">CNJ, tribunal, sistema, classe, vara, comarca, distribuicao e valor.</text>

  <rect x="120" y="328" width="38" height="38" rx="12" fill="#0F172A" stroke="#10B981" stroke-width="3"/>
  <path d="M130 346L144 359L170 333" stroke="#10B981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="188" y="355" fill="#E2E8F0" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Aba Partes</text>
  <text x="188" y="388" fill="#94A3B8" font-size="17" font-family="Segoe UI, Arial, sans-serif">Nome correto, papel correto, cliente ou contrario e qualificacao aproveitavel.</text>

  <rect x="120" y="428" width="38" height="38" rx="12" fill="#0F172A" stroke="#10B981" stroke-width="3"/>
  <path d="M130 446L144 459L170 433" stroke="#10B981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="188" y="455" fill="#E2E8F0" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Aba Andamentos</text>
  <text x="188" y="488" fill="#94A3B8" font-size="17" font-family="Segoe UI, Arial, sans-serif">Veja se o fluxo trouxe timeline suficiente ou se vale rodar o dossie depois.</text>

  <rect x="120" y="528" width="38" height="38" rx="12" fill="#0F172A" stroke="#10B981" stroke-width="3"/>
  <path d="M130 546L144 559L170 533" stroke="#10B981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="188" y="555" fill="#E2E8F0" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Titulo do caso</text>
  <text x="188" y="588" fill="#94A3B8" font-size="17" font-family="Segoe UI, Arial, sans-serif">Deixe claro para a equipe: quem, contra quem e qual o tipo do caso.</text>

  <rect x="792" y="230" width="280" height="302" rx="24" fill="#0B1120" stroke="#475569"/>
  <text x="824" y="272" fill="#F8FAFC" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Leitura segura</text>
  <text x="824" y="312" fill="#CBD5E1" font-size="17" font-family="Segoe UI, Arial, sans-serif">1. Importar</text>
  <text x="824" y="342" fill="#CBD5E1" font-size="17" font-family="Segoe UI, Arial, sans-serif">2. Revisar TJ</text>
  <text x="824" y="372" fill="#CBD5E1" font-size="17" font-family="Segoe UI, Arial, sans-serif">3. Revisar Partes</text>
  <text x="824" y="402" fill="#CBD5E1" font-size="17" font-family="Segoe UI, Arial, sans-serif">4. Ajustar o titulo</text>
  <text x="824" y="432" fill="#CBD5E1" font-size="17" font-family="Segoe UI, Arial, sans-serif">5. Salvar</text>
  <text x="824" y="478" fill="#94A3B8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Se faltar profundidade na leitura,</text>
  <text x="824" y="504" fill="#94A3B8" font-size="16" font-family="Segoe UI, Arial, sans-serif">rode depois o dossie do processo.</text>
</svg>
