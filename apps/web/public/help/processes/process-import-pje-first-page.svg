  <rect x="694" y="208" width="434" height="126" rx="22" fill="#0F172A" stroke="#2563EB"/>
  <text x="726" y="250" fill="#DBEAFE" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Bloco 1: capa TJ</text>
  <text x="726" y="286" fill="#BFDBFE" font-size="17" font-family="Segoe UI, Arial, sans-serif">Numero, classe, orgao julgador, distribuicao,</text>
  <text x="726" y="314" fill="#BFDBFE" font-size="17" font-family="Segoe UI, Arial, sans-serif">valor da causa, assuntos e sinais de urgencia.</text>

  <rect x="694" y="372" width="434" height="126" rx="22" fill="#0F172A" stroke="#8B5CF6"/>
  <text x="726" y="414" fill="#F5D0FE" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Bloco 2: partes e advogados</text>
  <text x="726" y="450" fill="#E9D5FF" font-size="17" font-family="Segoe UI, Arial, sans-serif">Ajuda a iniciar cliente, contrario, procuradores</text>
  <text x="726" y="478" fill="#E9D5FF" font-size="17" font-family="Segoe UI, Arial, sans-serif">e a classificacao inicial da aba Partes.</text>

  <rect x="694" y="536" width="434" height="126" rx="22" fill="#0F172A" stroke="#06B6D4"/>
  <text x="726" y="578" fill="#CFFAFE" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Bloco 3: documentos listados</text>
  <text x="726" y="614" fill="#A5F3FC" font-size="17" font-family="Segoe UI, Arial, sans-serif">Mostra se vale aprofundar leitura na inicial,</text>
  <text x="726" y="642" fill="#A5F3FC" font-size="17" font-family="Segoe UI, Arial, sans-serif">contestacao ou outras pecas com ganho real.</text>
