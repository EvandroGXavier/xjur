<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1120" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <rect x="32" y="32" width="1136" height="656" rx="24" stroke="rgba(148,163,184,0.25)" stroke-width="2"/>
  <text x="72" y="92" fill="#F8FAFC" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Importacao de Processos por PDF</text>
  <text x="72" y="128" fill="#94A3B8" font-size="18" font-family="Segoe UI, Arial, sans-serif">Fluxo pratico para pre-cadastro rapido e dossie do processo</text>

  <rect x="72" y="190" width="180" height="116" rx="22" fill="url(#card)" stroke="#334155"/>
  <text x="104" y="238" fill="#E2E8F0" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Usuario</text>
  <text x="104" y="272" fill="#94A3B8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Escolhe o PDF</text>

  <rect x="302" y="190" width="190" height="116" rx="22" fill="url(#card)" stroke="#334155"/>
  <text x="334" y="238" fill="#E2E8F0" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">PDF</text>
  <text x="334" y="272" fill="#94A3B8" font-size="16" font-family="Segoe UI, Arial, sans-serif">PJe, eproc ou outro</text>

  <rect x="542" y="170" width="240" height="156" rx="22" fill="url(#accent)" opacity="0.16"/>
  <rect x="542" y="170" width="240" height="156" rx="22" stroke="#8B5CF6"/>
  <text x="574" y="220" fill="#F8FAFC" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Leitura por fases</text>
  <text x="574" y="254" fill="#D8B4FE" font-size="16" font-family="Segoe UI, Arial, sans-serif">1. Detecta tribunal</text>
  <text x="574" y="280" fill="#D8B4FE" font-size="16" font-family="Segoe UI, Arial, sans-serif">2. Extrai capa TJ</text>
  <text x="574" y="306" fill="#D8B4FE" font-size="16" font-family="Segoe UI, Arial, sans-serif">3. Procura partes e qualificacao</text>

  <rect x="842" y="170" width="288" height="156" rx="22" fill="url(#card)" stroke="#334155"/>
  <text x="874" y="220" fill="#E2E8F0" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Resultado na tela</text>
  <text x="874" y="254" fill="#94A3B8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Aba TJ preenchida</text>
  <text x="874" y="280" fill="#94A3B8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Partes prontas para revisao</text>
  <text x="874" y="306" fill="#94A3B8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Resumo da importacao</text>

  <path d="M252 248H292" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M492 248H532" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M782 248H822" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M282 248L266 236V260L282 248Z" fill="#64748B"/>
  <path d="M522 248L506 236V260L522 248Z" fill="#64748B"/>
  <path d="M812 248L796 236V260L812 248Z" fill="#64748B"/>

  <rect x="72" y="392" width="324" height="208" rx="24" fill="#111827" stroke="#334155"/>
  <text x="104" y="438" fill="#F8FAFC" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Pre-cadastro</text>
  <text x="104" y="474" fill="#94A3B8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Use em Novo Processo</text>
  <text x="104" y="508" fill="#E2E8F0" font-size="17" font-family="Segoe UI, Arial, sans-serif">Preenche dados basicos</text>
  <text x="104" y="536" fill="#E2E8F0" font-size="17" font-family="Segoe UI, Arial, sans-serif">Nao consulta CNJ nesta etapa</text>
  <text x="104" y="564" fill="#E2E8F0" font-size="17" font-family="Segoe UI, Arial, sans-serif">Exige revisao antes de salvar</text>

  <rect x="438" y="392" width="324" height="208" rx="24" fill="#111827" stroke="#334155"/>
  <text x="470" y="438" fill="#F8FAFC" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Dossie do processo</text>
  <text x="470" y="474" fill="#94A3B8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Use em processo ja salvo</text>
  <text x="470" y="508" fill="#E2E8F0" font-size="17" font-family="Segoe UI, Arial, sans-serif">Aprofunda leitura do PDF</text>
  <text x="470" y="536" fill="#E2E8F0" font-size="17" font-family="Segoe UI, Arial, sans-serif">Importa andamentos e leitura operacional</text>
  <text x="470" y="564" fill="#E2E8F0" font-size="17" font-family="Segoe UI, Arial, sans-serif">Aproveita o proprio autos como fonte</text>

  <rect x="804" y="392" width="326" height="208" rx="24" fill="#0F172A" stroke="#334155"/>
  <text x="836" y="438" fill="#F8FAFC" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Regra de ouro</text>
  <text x="836" y="476" fill="#22D3EE" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">PDF-first</text>
  <text x="836" y="512" fill="#CBD5E1" font-size="17" font-family="Segoe UI, Arial, sans-serif">Se o PDF ja trouxe a informacao melhor,</text>
  <text x="836" y="540" fill="#CBD5E1" font-size="17" font-family="Segoe UI, Arial, sans-serif">nao consulte fonte externa para repetir.</text>
  <text x="836" y="576" fill="#94A3B8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Mais performance, menos custo e menos retrabalho.</text>
</svg>
