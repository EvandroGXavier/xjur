<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="420" rx="22" fill="url(#bg)"/>
  <text x="44" y="58" fill="#e2e8f0" font-family="Inter, Arial" font-size="26" font-weight="700">
    Histórico Gerado — como usar
  </text>
  <text x="44" y="88" fill="#94a3b8" font-family="Inter, Arial" font-size="16">
    Acompanhe documentos gerados a partir de modelos e seus status (rascunho/finalizado).
  </text>

  <g filter="url(#shadow)">
    <rect x="44" y="118" width="1112" height="254" rx="18" fill="#111827" stroke="#334155"/>
    <rect x="78" y="154" width="1044" height="52" rx="14" fill="#0f172a" stroke="#334155"/>
    <text x="100" y="186" fill="#cbd5e1" font-family="Inter, Arial" font-size="14" font-weight="700">Documento: Contestação — Cliente X</text>
    <rect x="940" y="166" width="160" height="28" rx="14" fill="#f59e0b" opacity="0.18" stroke="#f59e0b"/>
    <text x="962" y="186" fill="#fde68a" font-family="Inter, Arial" font-size="12" font-weight="700">Rascunho</text>

    <rect x="78" y="220" width="1044" height="52" rx="14" fill="#0f172a" stroke="#334155"/>
    <text x="100" y="252" fill="#cbd5e1" font-family="Inter, Arial" font-size="14" font-weight="700">Documento: Cumprimento de Sentença — Proc. CNJ</text>
    <rect x="940" y="232" width="160" height="28" rx="14" fill="#10b981" opacity="0.18" stroke="#10b981"/>
    <text x="958" y="252" fill="#6ee7b7" font-family="Inter, Arial" font-size="12" font-weight="700">Finalizado</text>

    <text x="78" y="320" fill="#94a3b8" font-family="Inter, Arial" font-size="13">
      Dica: use o histórico para auditoria interna e para encontrar versões anteriores rapidamente.
    </text>
  </g>
</svg>

