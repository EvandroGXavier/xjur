<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="420" rx="22" fill="url(#bg)"/>
  <text x="44" y="58" fill="#e2e8f0" font-family="Inter, Arial" font-size="26" font-weight="700">
    Tags — exemplo de padronização
  </text>
  <text x="44" y="88" fill="#94a3b8" font-family="Inter, Arial" font-size="16">
    Poucas tags bem consistentes facilitam busca e organização.
  </text>

  <g filter="url(#shadow)">
    <rect x="44" y="118" width="1112" height="254" rx="18" fill="#111827" stroke="#334155"/>
    <text x="78" y="162" fill="#cbd5e1" font-family="Inter, Arial" font-size="14" font-weight="700">
      Sugestões (Biblioteca)
    </text>

    <g>
      <rect x="78" y="186" width="120" height="30" rx="15" fill="#6366f1" fill-opacity="0.18" stroke="#6366f1"/>
      <text x="98" y="206" fill="#c7d2fe" font-family="Inter, Arial" font-size="12" font-weight="700">#Cível</text>
    </g>
    <g>
      <rect x="208" y="186" width="130" height="30" rx="15" fill="#0ea5e9" fill-opacity="0.18" stroke="#0ea5e9"/>
      <text x="228" y="206" fill="#bae6fd" font-family="Inter, Arial" font-size="12" font-weight="700">#CPC</text>
    </g>
    <g>
      <rect x="348" y="186" width="160" height="30" rx="15" fill="#10b981" fill-opacity="0.18" stroke="#10b981"/>
      <text x="368" y="206" fill="#6ee7b7" font-family="Inter, Arial" font-size="12" font-weight="700">#Contrato</text>
    </g>
    <g>
      <rect x="518" y="186" width="170" height="30" rx="15" fill="#f59e0b" fill-opacity="0.18" stroke="#f59e0b"/>
      <text x="538" y="206" fill="#fde68a" font-family="Inter, Arial" font-size="12" font-weight="700">#Execução</text>
    </g>
    <g>
      <rect x="698" y="186" width="220" height="30" rx="15" fill="#a855f7" fill-opacity="0.18" stroke="#a855f7"/>
      <text x="718" y="206" fill="#e9d5ff" font-family="Inter, Arial" font-size="12" font-weight="700">#Consumidor</text>
    </g>

    <text x="78" y="258" fill="#cbd5e1" font-family="Inter, Arial" font-size="14" font-weight="700">
      Exemplo de busca:
    </text>
    <text x="78" y="286" fill="#94a3b8" font-family="Inter, Arial" font-size="13">
      Digite “contrato” ou “cpc” na busca para filtrar rapidamente os modelos.
    </text>

    <rect x="78" y="306" width="560" height="44" rx="12" fill="#0f172a" stroke="#334155"/>
    <text x="100" y="334" fill="#64748b" font-family="Inter, Arial" font-size="14">Buscar modelos… (ex: contrato)</text>
  </g>
</svg>

