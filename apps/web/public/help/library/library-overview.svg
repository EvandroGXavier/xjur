<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="420" rx="22" fill="url(#bg)"/>

  <text x="44" y="56" fill="#e2e8f0" font-family="Inter, Arial" font-size="26" font-weight="700">
    Biblioteca de Modelos — visão rápida
  </text>
  <text x="44" y="86" fill="#94a3b8" font-family="Inter, Arial" font-size="16">
    O fluxo padrão: encontrar → abrir → personalizar (se Sistema) → salvar como Escritório → reutilizar.
  </text>

  <g filter="url(#shadow)">
    <rect x="44" y="120" width="540" height="250" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="76" y="162" fill="#cbd5e1" font-family="Inter, Arial" font-size="16" font-weight="700">1) Buscar</text>
    <text x="76" y="190" fill="#94a3b8" font-family="Inter, Arial" font-size="14">
      Use a barra para pesquisar por título, descrição e tags.
    </text>

    <rect x="76" y="212" width="460" height="44" rx="12" fill="#0f172a" stroke="#334155"/>
    <text x="98" y="240" fill="#64748b" font-family="Inter, Arial" font-size="14">Buscar modelos…</text>

    <text x="76" y="296" fill="#cbd5e1" font-family="Inter, Arial" font-size="16" font-weight="700">2) Abrir</text>
    <text x="76" y="324" fill="#94a3b8" font-family="Inter, Arial" font-size="14">
      Clique no card para abrir o editor e revisar o conteúdo.
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="616" y="120" width="540" height="250" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="648" y="162" fill="#cbd5e1" font-family="Inter, Arial" font-size="16" font-weight="700">3) Personalizar</text>
    <text x="648" y="190" fill="#94a3b8" font-family="Inter, Arial" font-size="14">
      Modelos do Sistema viram uma cópia editável (Escritório).
    </text>

    <rect x="648" y="212" width="240" height="44" rx="12" fill="#4f46e5" opacity="0.18" stroke="#6366f1"/>
    <text x="676" y="240" fill="#c7d2fe" font-family="Inter, Arial" font-size="14" font-weight="700">
      ✨ Personalizar
    </text>

    <text x="648" y="296" fill="#cbd5e1" font-family="Inter, Arial" font-size="16" font-weight="700">4) Salvar</text>
    <text x="648" y="324" fill="#94a3b8" font-family="Inter, Arial" font-size="14">
      Salve o modelo editável e padronize tags/variáveis para reutilização.
    </text>
  </g>
</svg>

