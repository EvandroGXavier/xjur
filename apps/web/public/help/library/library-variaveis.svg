<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="420" rx="22" fill="url(#bg)"/>
  <text x="44" y="58" fill="#e2e8f0" font-family="Inter, Arial" font-size="26" font-weight="700">
    Variáveis dinâmicas — exemplo prático
  </text>
  <text x="44" y="88" fill="#94a3b8" font-family="Inter, Arial" font-size="16">
    Use variáveis para automatizar preenchimento (cliente, processo, datas).
  </text>

  <g filter="url(#shadow)">
    <rect x="44" y="118" width="1112" height="254" rx="18" fill="#111827" stroke="#334155"/>

    <text x="78" y="162" fill="#cbd5e1" font-family="Inter, Arial" font-size="14" font-weight="700">
      Exemplo de bloco no modelo:
    </text>

    <rect x="78" y="180" width="1044" height="150" rx="14" fill="#0b1220" stroke="#334155"/>
    <text x="100" y="212" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="14">
      &lt;p&gt;Eu, &lt;strong&gt;{{contact.name}}&lt;/strong&gt;, CPF/CNPJ {{contact.document}},&lt;/p&gt;
    </text>
    <text x="100" y="236" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="14">
      &lt;p&gt;no processo {{process.cnj}} da comarca {{process.district}},&lt;/p&gt;
    </text>
    <text x="100" y="260" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="14">
      &lt;p&gt;assino em {{today.fullDate}}.&lt;/p&gt;
    </text>

    <text x="78" y="352" fill="#94a3b8" font-family="Inter, Arial" font-size="13">
      Resultado: ao gerar o documento, o sistema substitui automaticamente os campos com dados reais.
    </text>
  </g>
</svg>

