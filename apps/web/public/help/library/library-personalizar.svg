<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="420" rx="22" fill="url(#bg)"/>
  <text x="44" y="58" fill="#e2e8f0" font-family="Inter, Arial" font-size="26" font-weight="700">
    Exemplo prático: Personalizar um modelo do Sistema
  </text>
  <text x="44" y="88" fill="#94a3b8" font-family="Inter, Arial" font-size="16">
    Objetivo: transformar um “Sistema” em “Escritório” para você poder editar e salvar.
  </text>

  <g filter="url(#shadow)">
    <rect x="44" y="118" width="1112" height="254" rx="18" fill="#111827" stroke="#334155"/>

    <rect x="78" y="154" width="340" height="186" rx="16" fill="#0f172a" stroke="#334155"/>
    <text x="100" y="184" fill="#cbd5e1" font-family="Inter, Arial" font-size="14" font-weight="700">1) Abra o card (Sistema)</text>
    <text x="100" y="210" fill="#94a3b8" font-family="Inter, Arial" font-size="13">
      Procure pelo selo “Sistema”.
    </text>
    <rect x="100" y="236" width="160" height="26" rx="13" fill="#f59e0b" opacity="0.18" stroke="#f59e0b"/>
    <text x="114" y="254" fill="#fcd34d" font-family="Inter, Arial" font-size="12" font-weight="700">✨ Sistema</text>

    <rect x="430" y="154" width="340" height="186" rx="16" fill="#0f172a" stroke="#334155"/>
    <text x="452" y="184" fill="#cbd5e1" font-family="Inter, Arial" font-size="14" font-weight="700">2) Clique em “Personalizar”</text>
    <text x="452" y="210" fill="#94a3b8" font-family="Inter, Arial" font-size="13">
      O sistema cria uma cópia editável.
    </text>
    <rect x="452" y="236" width="210" height="36" rx="12" fill="#4f46e5" opacity="0.2" stroke="#6366f1"/>
    <text x="474" y="260" fill="#c7d2fe" font-family="Inter, Arial" font-size="13" font-weight="700">✨ Personalizar</text>

    <rect x="782" y="154" width="340" height="186" rx="16" fill="#0f172a" stroke="#334155"/>
    <text x="804" y="184" fill="#cbd5e1" font-family="Inter, Arial" font-size="14" font-weight="700">3) Edite e “Salvar Modelo”</text>
    <text x="804" y="210" fill="#94a3b8" font-family="Inter, Arial" font-size="13">
      Agora o selo vira “Escritório”.
    </text>
    <rect x="804" y="236" width="190" height="26" rx="13" fill="#10b981" opacity="0.18" stroke="#10b981"/>
    <text x="818" y="254" fill="#6ee7b7" font-family="Inter, Arial" font-size="12" font-weight="700">Escritório</text>
  </g>
</svg>

