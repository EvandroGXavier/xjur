name: Deploy Production
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Connect and Update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            source /etc/profile
            [ -f ~/.bashrc ] && source ~/.bashrc
            
            cd /www/wwwroot/DrX
            set -e 

            echo "========================================="
            echo "🚀 DR.X SUPREMO DEPLOY (V2 CORRIGIDA) - $(date)"
            echo "========================================="

            echo "1️⃣ Sincronizando código..."
            git fetch --all
            git reset --hard origin/main

            echo "2️⃣ Instalando dependências (Para garantir apenas Prisma/Push na host)..."
            npm install --production=false

            echo "3️⃣ Garantindo que o Banco de Dados está rodando para o Push..."
            docker compose -f docker-compose.prod.yml up -d db
            sleep 5

            echo "4️⃣ Sincronizando Banco de Dados (Schema Push)..."
            export DATABASE_URL="postgresql://drx:drx_secure_pass_123@localhost:5434/drx_db?schema=public"
            npx prisma db push --schema=packages/database/prisma/schema.prisma --accept-data-loss

            echo "5️⃣ Configurando Variáveis Docker..."
            export DATABASE_URL="postgresql://drx:drx_secure_pass_123@db:5432/drx_db?schema=public"
            
            echo "6️⃣ Reconstruindo Containers (Otimizado com .dockerignore)..."
            docker compose -f docker-compose.prod.yml build api web
            
            echo "7️⃣ Subindo a Stack Completa..."
            docker compose -f docker-compose.prod.yml up -d
            
            echo "========================================="
            echo "📊 STATUS FINAL:"
            echo "========================================="
            docker compose -f docker-compose.prod.yml ps
            
            echo "8️⃣ Sincronizando Webhooks do Telegram..."
            # Executamos o script de dentro do container da API para usar o ambiente correto
            docker compose -f docker-compose.prod.yml exec -T api node -e "
              const { NestFactory } = require('@nestjs/core');
              const { AppModule } = require('./apps/api/dist/app.module');
              const { TelegramService } = require('./apps/api/dist/telegram/telegram.service');
              const { PrismaClient } = require('@prisma/client');

              async function sync() {
                try {
                  const app = await NestFactory.createApplicationContext(AppModule);
                  const telegramService = app.get(TelegramService);
                  const prisma = new PrismaClient();
                  const connections = await prisma.connection.findMany({ where: { type: 'TELEGRAM', status: 'CONNECTED' } });
                  for (const conn of connections) {
                    try {
                      await telegramService.connect(conn.id);
                    } catch (err) {
                      console.error(`[Telegram Sync] ❌ Erro ao sincronizar ${conn.name}:`, err.message);
                    }
                  }
                  await prisma.$disconnect();
                  await app.close();
                } catch (error) {
                  console.error('[Telegram Sync] ❌ Erro fatal:', error.message);
                }
              }
              sync();
            " || echo "⚠️ Aviso: Falha na sincronização do Telegram (Pode ser normal no primeiro deploy)"

            echo ""
            echo "🩺 HEALTH CHECK:"
            sleep 5
            curl -I https://dr-x.xtd.com.br | grep "HTTP" || echo "Web: ❌ Offline"
            curl -I https://api.dr-x.xtd.com.br/app | grep "HTTP" || echo "API: ❌ Offline"
            
            echo "🚀 DEPLOY FINALIZADO COM SUCESSO!"