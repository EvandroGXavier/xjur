name: Deploy Production
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Connect and Update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            source /etc/profile
            [ -f ~/.bashrc ] && source ~/.bashrc
            
            cd /www/wwwroot/DrX
            set -e 

            echo "========================================="
            echo "🚀 DR.X SUPREMO DEPLOY (V2 CORRIGIDA) - $(date)"
            echo "========================================="

            echo "1️⃣ Sincronizando código..."
            git fetch --all
            git reset --hard origin/main

            echo "2️⃣ Instalando dependências..."
            npm install

            echo "3️⃣ Garantindo que o Banco de Dados está rodando para o Push..."
            docker compose -f docker-compose.prod.yml up -d db
            sleep 5

            echo "4️⃣ Sincronizando Banco de Dados ANTES do Build (Evita erro de coluna faltando)..."
            export DATABASE_URL="postgresql://drx:drx_secure_pass_123@localhost:5434/drx_db?schema=public"
            npx prisma db push --schema=packages/database/prisma/schema.prisma --accept-data-loss

            echo "5️⃣ Gerando a Interface Web (Frontend) na VPS..."
            npx turbo run build --filter=web

            echo "6️⃣ Limpando PM2..."
            pm2 delete all 2>/dev/null || true

            echo "7️⃣ Configurando Variáveis Docker..."
            export DATABASE_URL="postgresql://drx:drx_secure_pass_123@db:5432/drx_db?schema=public"
            
            echo "8️⃣ Reconstruindo Containers..."
            docker compose -f docker-compose.prod.yml build --no-cache api web
            
            echo "9️⃣ Subindo a Stack Completa..."
            docker compose -f docker-compose.prod.yml up -d
            
            echo "========================================="
            echo "📊 STATUS FINAL:"
            echo "========================================="
            docker compose -f docker-compose.prod.yml ps

            echo ""
            echo "🩺 HEALTH CHECK:"
            sleep 5
            curl -I https://dr-x.xtd.com.br | grep "HTTP" || echo "Web: ❌ Offline"
            curl -I https://api.dr-x.xtd.com.br/app | grep "HTTP" || echo "API: ❌ Offline"
            
            echo "🚀 DEPLOY FINALIZADO COM SUCESSO!"