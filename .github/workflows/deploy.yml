name: Deploy Production
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Connect and Update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 40m
          script: |
            export PATH=$PATH:/usr/local/bin
            source /etc/profile
            [ -f ~/.bashrc ] && source ~/.bashrc

            cd /www/wwwroot/DrX
            set -e

            echo "========================================="
            echo "DR.X deploy resiliente - $(date)"
            echo "========================================="

            echo "1. Sincronizando codigo via Git..."
            git fetch --all --prune
            git reset --hard origin/main
            git clean -fd
            DEPLOY_COMMIT=$(git rev-parse --short HEAD)
            echo "Commit para implantacao: ${DEPLOY_COMMIT}"

            echo "2. Garantindo banco de dados para migracao..."
            docker compose -f docker-compose.prod.yml up -d db

            echo "Aguardando banco (porta 5434) ficar pronto..."
            for i in {1..12}; do
              if nc -z localhost 5434; then
                echo "Banco de dados pronto."
                break
              fi
              echo "Tentativa $i: aguardando porta 5434..."
              sleep 5
            done

            echo "3. Sincronizando schema (Prisma DB Push)..."
            export DATABASE_URL="postgresql://drx:drx_secure_pass_123@localhost:5434/drx_db?schema=public"

            echo "3.2. Limpando pastas de build..."
            rm -rf apps/web/dist apps/api/dist

            npx prisma db push --schema=packages/database/prisma/schema.prisma --accept-data-loss || {
              echo "npx falhou ou versao incompativel. Instalando prisma do projeto..."
              npm install prisma@5.20.0 --no-save
              npx prisma db push --schema=packages/database/prisma/schema.prisma --accept-data-loss
            }

            echo "3.3. Saneando identidades WhatsApp na base da VPS..."
            node scripts/sanitize-whatsapp-identities.js --apply || {
              echo "Sanitizador sem dependencias suficientes no host. Instalando Prisma Client temporario..."
              npm install @prisma/client@5.20.0 --no-save
              node scripts/sanitize-whatsapp-identities.js --apply
            }

            echo "3.5. Limpando espaco em disco..."
            docker image prune -af --filter "until=24h"
            df -h

            echo "4. Construindo imagens..."
            docker image prune -af --filter "until=2h"
            docker compose -f docker-compose.prod.yml build --pull --build-arg CACHE_BUST=$(date +%s) api web

            echo "5. Subindo aplicacao..."
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate api web
            docker compose -f docker-compose.prod.yml up -d

            echo "6. Limpeza final de disco..."
            docker image prune -f

            echo "========================================="
            echo "Status final dos servicos:"
            echo "========================================="
            docker compose -f docker-compose.prod.yml ps

            echo "7. Sincronizando Telegram..."
            sleep 20

            docker compose -f docker-compose.prod.yml exec -T api node -e "
              const { NestFactory } = require('@nestjs/core');

              async function sync() {
                try {
                  console.log('--- Iniciando sincronismo de bots ---');
                  const { AppModule } = require('./apps/api/dist/app.module');
                  const { TelegramService } = require('./apps/api/dist/telegram/telegram.service');
                  const { PrismaClient } = require('@prisma/client');

                  const app = await NestFactory.createApplicationContext(AppModule);
                  const telegramService = app.get(TelegramService);
                  const prisma = new PrismaClient();

                  const conns = await prisma.connection.findMany({
                    where: { type: 'TELEGRAM', status: 'CONNECTED' }
                  });

                  console.log('Bots ativos para reconexao:', conns.length);

                  for (const conn of conns) {
                    try {
                      await telegramService.connect(conn.id);
                      console.log('Bot [' + conn.name + '] sincronizado.');
                    } catch (e) {
                      console.error('Erro no bot [' + conn.name + ']:', e.message);
                    }
                  }

                  await prisma.$disconnect();
                  await app.close();
                  console.log('--- Sincronismo finalizado ---');
                  process.exit(0);
                } catch (err) {
                  console.error('ERRO FATAL NO SYNC:', err.message);
                  process.exit(1);
                }
              }
              sync().catch(e => { console.error(e); process.exit(1); });
            " || echo "Aviso: o sync do Telegram falhou, mas o deploy foi concluido."

            echo ""
            echo "Verificacao de saude:"
            sleep 5
            echo "${DEPLOY_COMMIT}" > .deploy-version
            curl -s -o /dev/null -w "Web status: %{http_code}\n" https://dr-x.xtd.com.br || echo "Web offline"
            curl -s -o /dev/null -w "API status: %{http_code}\n" https://api.dr-x.xtd.com.br/app || echo "API offline"

            echo "========================================="
            echo "Deploy concluido com sucesso."
            echo "========================================="
