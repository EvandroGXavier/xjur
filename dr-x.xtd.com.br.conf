server {
    listen 80;
    server_name dr-x.xtd.com.br api.dr-x.xtd.com.br studio.dr-x.xtd.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dr-x.xtd.com.br;

    ssl_certificate /etc/letsencrypt/live/dr-x.xtd.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dr-x.xtd.com.br/privkey.pem;

    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.dr-x.xtd.com.br;

    ssl_certificate /etc/letsencrypt/live/dr-x.xtd.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dr-x.xtd.com.br/privkey.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
